name: Update Market Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz pandas

      - name: Fetch market data
        run: python fetch_data.py

      - name: Commit data.json
        run: |
          git config user.name "market-bot"
          git config user.email "bot@pm-ai-os.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
